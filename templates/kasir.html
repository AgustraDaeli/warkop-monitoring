<!DOCTYPE html>
<html>
<head>
    <title>Kasir</title>

    
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: #2ecc71;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #27ae60;
        }

        .nav {
            padding: 10px;
            background: #34495e;
            color: white;
        }

        .nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>☕ Kasir Warkop Ageto</h2>
</div>

<div class="nav">
    <a href="/">Dashboard</a>
    <a href="/stok">Stok</a>
    <a href="/report">Report</a>
</div>

<div class="container">

    {% for item in menu %}
    <div class="card">
        <h3>{{ item[1] }}</h3>
        <p>Harga: Rp {{ item[2] }}</p>

        <button class="btn"
            onclick="location.href='/beli/{{ item[1] }}/{{ item[2] }}'">
            Beli
        </button>
    </div>
    {% endfor %}

</div>

</body>
</html>
