<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Warkop App{% endblock %}</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        /* ================= SIDEBAR (PERSIS INDEX KAMU) ================= */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 100%;
            background: #2c3e50;
            transition: 0.3s;
            overflow: hidden;
        }

        .sidebar.active {
            width: 130px;
        }

        /* MENU ITEM */
        .menu-item {
            display: flex;
            align-items: center;
            color: white;
            padding: 15px;
            cursor: pointer;
        }

        .menu-item:hover {
            background: #34495e;
        }

        /* ICON */
        .icon {
            width: 30px;
            text-align: center;
            font-size: 18px;
        }

        /* TEXT */
        .text {
            margin-left: 10px;
            opacity: 0;
            transition: 0.3s;
        }

        .sidebar.active .text {
            opacity: 1;
        }

        /* ================= CONTENT ================= */
        .content {
            margin-left: 60px;
            transition: 0.3s;
            padding: 20px;
        }

        .sidebar.active ~ .content {
            margin-left: 130px;
        }

        .popup{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        .popup-box{
            background:white;
            padding:25px;
            border-radius:12px;
            text-align:center;
            min-width:250px;
        }

        .popup-box button{
            margin:5px;
            padding:8px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<!-- SIDEBAR (PERSIS KAMU) -->
<div id="sidebar" class="sidebar">

    <!-- TOGGLE -->
    <div class="menu-item" onclick="toggleSidebar()">
        <div class="icon">☰</div>
        <div class="text">Menu</div>
    </div>

    <!-- HOME -->
    <div class="menu-item" 
         onmouseenter="hoverOpen()" 
         onmouseleave="hoverClose()"
         onclick="location.href='/'">
        <div class="icon">🏠</div>
        <div class="text">Home</div>
    </div>

    <!-- HISTORY -->
    <div class="menu-item" 
         onmouseenter="hoverOpen()" 
         onmouseleave="hoverClose()"
         onclick="location.href='/history'">
        <div class="icon">📜</div>
        <div class="text">History</div>
    </div>

    <!-- STOK -->
    <div class="menu-item" 
         onmouseenter="hoverOpen()" 
         onmouseleave="hoverClose()"
         onclick="location.href='/stok'">
        <div class="icon">📦</div>
        <div class="text">Stok</div>
    </div>

    <!-- GRAFIK -->
    <div class="menu-item" 
         onmouseenter="hoverOpen()" 
         onmouseleave="hoverClose()"
         onclick="location.href='/grafik'">
        <div class="icon">📊</div>
        <div class="text">Grafik</div>
    </div>

    <!-- REPORT -->
    <div class="menu-item" 
         onmouseenter="hoverOpen()" 
         onmouseleave="hoverClose()"
         onclick="location.href='/report'">
        <div class="icon">📑</div>
        <div class="text">Report</div>
    </div>

    <!-- LOGOUT -->
    <div class="menu-item" 
         onmouseenter="hoverOpen()" 
         onmouseleave="hoverClose()"
         onclick="showLogoutPopup()">
        <div class="icon">🔓</div>
        <div class="text">Logout</div>
    </div>

</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}

function hoverOpen() {
    document.getElementById("sidebar").classList.add("active");
}

function hoverClose() {
    document.getElementById("sidebar").classList.remove("active");
}

function showLogoutPopup() {
    document.getElementById("logoutPopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("logoutPopup").style.display = "none";
}

function logout() {
    window.location.href = "/logout";
}


</script>

<div id="logoutPopup" class="popup" style="display:none;">
    <div class="popup-box">
        <h3>Yakin ingin logout?</h3>

        <button onclick="logout()">
            Ya
        </button>

        <button onclick="closePopup()">
            Batal
        </button>
    </div>
</div>

</body>
</html>
