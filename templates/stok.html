{% extends "base.html" %}

{% block title %}Stok{% endblock %}

{% block content %}

<div class="container">

    <div class="header">
        <h2>📦 Manajemen Stok</h2>

        <input
            type="text"
            id="searchInput"
            class="search-box"
            placeholder="Cari bahan..."
            onkeyup="searchStok()">
    </div>

    <br>

    {% for b in bahan %}
    <div class="card stok-item">

        <div>
            <b>{{ b[1] }}</b><br>
            Stok: {{ b[2] }}
        </div>

        <div class="actions">

            <input type="number" id="qty-{{ b[0] }}" min="1" value="1">

            <button type="button"
                class="tambah"
                onclick="openStokPopup({{ b[0] }}, 'tambah')">
                +
            </button>

            <button type="button"
                class="kurang"
                onclick="openStokPopup({{ b[0] }}, 'kurang')">
                -
            </button>

        </div>

    </div>
    {% endfor %}

</div>

<!-- 🔐 POPUP PASSWORD -->
<div id="stokPopup" class="popup">
    <div class="popup-box">

        <h3>Masukkan Password</h3>

        <input type="password" id="stokPassword" placeholder="Password">

        <br><br>

        <button class="btn-ok" onclick="prosesStok()">OK</button>
        <button class="btn-cancel" onclick="tutupStokPopup()">Batal</button>

    </div>
</div>

<style>

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.search-box{
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    width:200px;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.actions{
    display:flex;
    gap:10px;
    align-items:center;
}

.actions input{
    width:60px;
    padding:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

/* tombol stok */
.tambah{
    background:#2ecc71;
}

.kurang{
    background:#e67e22;
}

.tambah:hover,
.kurang:hover{
    opacity:0.85;
}

/* popup */
.popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    min-width:250px;
}

/* 🔥 FIX BUTTON POPUP BIAR JELAS */
.btn-ok{
    background:#2ecc71;
    color:white;
    margin:5px;
    padding:8px 15px;
    border-radius:8px;
    font-weight:600;
}

.btn-cancel{
    background:#e74c3c;
    color:white;
    margin:5px;
    padding:8px 15px;
    border-radius:8px;
    font-weight:600;
}

.btn-ok:hover,
.btn-cancel:hover{
    opacity:0.85;
}

</style>

<script>

let stokBahanId = null;
let stokAksi = null;

function openStokPopup(id, aksi){
    stokBahanId = id;
    stokAksi = aksi;

    document.getElementById("stokPassword").value = "";
    document.getElementById("stokPopup").style.display = "flex";
}

function tutupStokPopup(){
    document.getElementById("stokPopup").style.display = "none";
}

function prosesStok(){

    let password = document.getElementById("stokPassword").value;

    let qtyInput = document.getElementById("qty-" + stokBahanId);
    let qty = qtyInput ? qtyInput.value : 1;

    fetch("/stok", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `bahan_id=${stokBahanId}&qty=${qty}&aksi=${stokAksi}&password=${password}`
    })
    .then(res => {

        if(res.status === 403){
            alert("Password salah!");
            return null;
        }

        return res.text();
    })
    .then(data => {

        if(!data) return;

        tutupStokPopup();

        // refresh tampilan stok
        location.reload();

    });

}

function searchStok(){
    let keyword =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    document.querySelectorAll(".stok-item").forEach(item => {
        let text = item.innerText.toLowerCase();

        item.style.display =
            text.includes(keyword)
            ? "flex"
            : "none";
    });
}

</script>

{% endblock %}
