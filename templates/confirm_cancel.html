<!DOCTYPE html>
<html>
<head>
    <title>Konfirmasi Cancel</title>
</head>
<body>

<h3>Masukkan Password untuk Cancel</h3>

<form method="POST" action="/cancel">
    <input type="hidden" name="id" value="{{ id }}">
    
    <input type="password" name="password" placeholder="Password" required>
    <br><br>
    
    <button type="submit">Konfirmasi Cancel</button>
</form>
    

</body>
</html>
